name: ish-libation

services:
  ish-libation:
    image: ghcr.io/maroishiku/ish-libation:latest
    pull_policy: always
    container_name: ish-libation
    hostname: ish-libation
    user: "0:0"
    cpu_shares: 90
    command: []
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "16767905792"
        reservations:
          devices: []
    environment:
      TZ: Europe/Berlin
      PORT: 3000
      LIBATION_FILES_DIR: /config
      LIBATION_CONFIG_DIR: /config
      LIBATION_DB_DIR: /db
      LIBATION_DB_FILE: ""
      LIBATION_BOOKS_DIR: /data
      PUBLIC_IP_URL: https://api.ipify.org?format=json
      PUBLIC_IP_INTERVAL_SECONDS: 300
      NODE_ENV: production
    volumes:
      - type: bind
        source: /media/ZimaOS-HD/AppData/ish_libation/config
        target: /config
      - type: bind
        source: /media/ZimaOS-HD/AppData/ish_libation/db
        target: /db
      - type: bind
        source: /media/ZimaOS-HD/AppData/ish_libation/data
        target: /data
    devices: []
    cap_add: []
    privileged: false
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      icon: https://raw.githubusercontent.com/rmcrackan/Libation/master/Source/LibationAvalonia/Assets/libation.ico

  gluetun:
    image: qmcgaw/gluetun:latest
    pull_policy: always
    container_name: ishlibgt
    hostname: ishlibgt
    cpu_shares: 90
    command: []
    restart: unless-stopped
    network_mode: bridge
    privileged: false
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    deploy:
      resources:
        limits:
          memory: "16767868928"
        reservations:
          devices: []
    environment:
      TZ: Europe/Berlin
      VPN_SERVICE_PROVIDER: mullvad
      VPN_TYPE: wireguard
      MULLVAD_ACCOUNT_ID: INSERT_HERE
      WIREGUARD_PRIVATE_KEY: INSERT_HERE
      WIREGUARD_ADDRESSES: INSERT_HERE
      FIREWALL_INPUT_PORTS: 3000
      HTTP_CONTROL_SERVER: "on"
      HTTP_CONTROL_SERVER_ADDRESS: ":8000"
      LOG_LEVEL: info
    ports:
      - target: 3000
        published: "3100"
        protocol: tcp
    volumes:
      - type: bind
        source: /media/ZimaOS-HD/AppData/ish_libation/gluetun
        target: /gluetun
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9999 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      icon: https://icon.casaos.io/main/all/gluetun.png

x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://raw.githubusercontent.com/rmcrackan/Libation/master/Source/LibationAvalonia/Assets/libation.ico
  index: /
  is_uncontrolled: false
  port_map: "3100"
  scheme: http
  store_app_id: ish-libation
  title:
    custom: Libation (Ish)
    en_us: Libation (Ish)
